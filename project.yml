name: MarkdownReader
options:
  bundleIdPrefix: com.youngchingjui
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

targets:
  MarkdownReader:
    type: application
    platform: macOS
    sources:
      - path: Sources/MarkdownReader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youngchingjui.MarkdownReader
        PRODUCT_NAME: MarkdownReader
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        INFOPLIST_FILE: Sources/MarkdownReader/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/MarkdownReader/MarkdownReader.entitlements
        ENABLE_HARDENED_RUNTIME: true
